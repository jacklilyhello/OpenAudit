name: Gosec

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  gosec:
    name: Go security scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache: true

      - name: Install gosec CLI
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec and generate SARIF
        run: |
          echo "Phase 5 runs gosec with -no-fail so findings are reported without blocking early development. Remove -no-fail later to make gosec blocking."
          gosec -no-fail -fmt sarif -out gosec-results.sarif ./...

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: gosec-results.sarif
