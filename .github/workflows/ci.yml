name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Go test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Run go vet
        run: |
          go vet ./...

      - name: Run tests
        run: |
          go test ./...

      - name: Build
        run: |
          go build ./...
