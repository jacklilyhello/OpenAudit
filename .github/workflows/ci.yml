name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Format, vet, test, build, smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache: true

      - name: Check formatting
        run: |
          test -z "$(gofmt -l $(find . -name '*.go' -not -path './vendor/*'))"

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Build all packages
        run: go build ./...

      - name: Run smoke test
        run: ./scripts/smoke.sh
