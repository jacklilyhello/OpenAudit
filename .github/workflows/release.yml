name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache: true

      - name: Build release artifacts
        run: make snapshot VERSION=${GITHUB_REF_NAME} COMMIT=${GITHUB_SHA} DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/snapshot/*.tar.gz
            dist/snapshot/SHA256SUMS
          generate_release_notes: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push default RE2 image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: default
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.repository.updated_at }}
          tags: |
            ghcr.io/jacklilyhello/openaudit:${{ github.ref_name }}
            ghcr.io/jacklilyhello/openaudit:latest

      - name: Build and push optional PCRE2 image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: pcre2
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.repository.updated_at }}
          tags: |
            ghcr.io/jacklilyhello/openaudit:${{ github.ref_name }}-pcre2
            ghcr.io/jacklilyhello/openaudit:pcre2
