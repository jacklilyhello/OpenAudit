name: Release build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Linux artifacts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -ldflags "-s -w -X github.com/openaudit/openaudit/internal/api.Version=${GITHUB_REF_NAME:-manual} -X github.com/openaudit/openaudit/internal/api.Commit=${GITHUB_SHA} -X github.com/openaudit/openaudit/internal/api.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o dist/openaudit-${GOOS}-${GOARCH} ./cmd/server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openaudit-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/openaudit-${{ matrix.goos }}-${{ matrix.goarch }}
